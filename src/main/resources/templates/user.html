<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      >
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <strong th:text="${user.email}">user@gmail.com</strong>
            with role:
            <span th:text="${#strings.replace(#strings.listJoin(#lists.sort(user.roles.![name]), ' '), 'ROLE_', '')}"></span>

            </span>
        </span>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none">
                Logout
            </button>
        </form>
    </div>
</nav>
<div class="d-flex">


    <div class="nav flex-column nav-pills" style="width:200px; min-height:100vh;" role="tablist">

        <a class="nav-link"
           sec:authorize="hasRole('ADMIN')"
           th:classappend="${#httpServletRequest.requestURI == '/admin' ? 'active' : ''}"
           th:href="@{/admin}">
            Admin
        </a>

        <a class="nav-link"
           sec:authorize="hasRole('USER')"
           th:classappend="${#httpServletRequest.requestURI == '/user' ? 'active' : ''}"
           th:href="@{/user}">
            User
        </a>

    </div>


    <div class="flex-grow-1 p-4">

        <h1>User information-page</h1>


        <div class="tab-content border border-top-0 bg-white">
            <div class="tab-pane fade show active" id="table-content" role="tabpanel">

                <div class="card">

                    <div class="card-header">
                        <h5 class="m-0">About user</h5>
                    </div>

                    <div class="card-body">

                        <table class="table table-striped">

                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="user : ${user}">

                                <td th:text="${user.id}"></td>
                                <td th:text="${user.username}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.age}"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${#strings.replace(#strings.listJoin(#lists.sort(user.roles.![name]), ' '), 'ROLE_', '')}"></td>

                                <td>

                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
