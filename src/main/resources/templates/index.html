<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <strong th:text="${user.email}">admin@gmail.com</strong>
            with roles:
           <span th:text="${#strings.replace(#strings.listJoin(#lists.sort(user.roles.![name]), ' '), 'ROLE_', '')}"> </span>

            </span>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="d-flex">


    <div class="nav flex-column nav-pills" style="width:200px; min-height:100vh;" role="tablist">

        <a class="nav-link"
           sec:authorize="hasRole('ADMIN')"
           th:classappend="${#httpServletRequest.requestURI == '/admin' ? 'active' : ''}"
           th:href="@{/admin}">
            Admin
        </a>

        <a class="nav-link"
           sec:authorize="hasRole('USER')"
           th:classappend="${#httpServletRequest.requestURI == '/user' ? 'active' : ''}"
           th:href="@{/user}">
            User
        </a>

    </div>


    <div class="flex-grow-1 p-4">

        <h1>Admin panel</h1>


        <ul class="nav nav-tabs" id="adminTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#table-content"
                        type="button" role="tab">Users table
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#form-content"
                        type="button" role="tab">New User
                </button>
            </li>
        </ul>
        <div class="tab-content border border-top-0 bg-white">
            <div class="tab-pane fade show active" id="table-content" role="tabpanel">

                <div class="card">

                    <div class="card-header">
                        <h5 class="m-0">All users</h5>
                    </div>

                    <div class="card-body">

                        <table class="table table-striped">

                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="user : ${listOfUsers}">

                                <td th:text="${user.id}"></td>
                                <td th:text="${user.username}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.age}"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${#strings.replace(#strings.listJoin(#lists.sort(user.roles.![name]), ' '), 'ROLE_', '')}"></td>

                                <td>
                                    <button class="btn btn-sm  btn-info text-white"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="'#editModal' + ${user.id}">
                                        Edit
                                    </button>

                                    <div class="modal fade"
                                         th:id="'editModal' + ${user.id}"
                                         tabindex="-1">

                                        <div class="modal-dialog">
                                            <div class="modal-content">

                                                <div class="modal-header">
                                                    <h5 class="modal-title">Edit User</h5>
                                                    <button class="btn-close"
                                                            data-bs-dismiss="modal">
                                                    </button>
                                                </div>

                                                <div class="modal-body">

                                                    <form th:action="@{/admin/edit}" method="post">

                                                        <label for="idInput"
                                                               class="form-label fw-bold text-center d-block">ID</label>
                                                        <input type="number" name="id"
                                                               class="form-control mb-2"
                                                               id="idInput"
                                                               th:value="${user.id}" readonly>

                                                        <label for="userNameInput"
                                                               class="form-label fw-bold text-center d-block">First
                                                            Name</label>
                                                        <input type="text" name="username"
                                                               class="form-control mb-2"
                                                               id="userNameInput"
                                                               th:value="${user.username}">

                                                        <label for="lastNameInput"
                                                               class="form-label fw-bold text-center d-block">Last
                                                            Name</label>
                                                        <input type="text" name="lastName"
                                                               id="lastNameInput"
                                                               class="form-control mb-2"
                                                               th:value="${user.lastName}">

                                                        <label for="ageInput"
                                                               class="form-label fw-bold text-center d-block">Age</label>
                                                        <input type="number" name="age"
                                                               id="ageInput"
                                                               class="form-control mb-2"
                                                               th:value="${user.age}">

                                                        <label for="emailInput"
                                                               class="form-label fw-bold text-center d-block">Email</label>
                                                        <input type="email" name="email"
                                                               id="emailInput"
                                                               class="form-control mb-2"
                                                               th:value="${user.email}">

                                                        <label for="passwordInput"
                                                               class="form-label fw-bold text-center d-block">Password </label>
                                                        <input type="password" id="passwordInput"
                                                               name="password"
                                                               class="form-control mb-2" readonly>

                                                        <div class="mb-3">
                                                            <label for="roleInput"
                                                                   class="form-label fw-bold text-center d-block">Role</label>
                                                            <select name="roles" id="roleInput" class="form-select"
                                                                    multiple size="2">
                                                                <option value="ROLE_ADMIN">ADMIN</option>
                                                                <option value="ROLE_USER">USER</option>
                                                            </select>
                                                        </div>

                                                        <div class="modal-footer d-flex justify-content-end gap-1">
                                                            <button type="button" class="btn btn-secondary"
                                                                    data-bs-dismiss="modal">Close
                                                            </button>
                                                            <button type="submit" class="btn  btn-info text-white">Edit</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </td>

                                <td>
                                    <button class="btn btn-sm btn-danger" data-bs-toggle="modal"
                                            th:data-bs-target="'#deleteModal' + ${user.id}">
                                        Delete
                                    </button>

                                    <div class="modal fade" th:id="'deleteModal' + ${user.id}" tabindex="-1"
                                         aria-hidden="true">
                                        <div class="modal-dialog">
                                            <div class="modal-content">

                                                <div class="modal-header">
                                                    <h5 class="modal-title">Delete user</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                            aria-label="Close"></button>
                                                </div>

                                                <div class="modal-body text-center">

                                                    <form th:action="@{/admin/delete}" method="post">
                                                        <input type="hidden" name="id" th:value="${user.id}">

                                                        <label class="form-label fw-bold">ID</label>
                                                        <input type="text"
                                                               th:value="${user.id}" class="form-control bg-light"
                                                               disabled>

                                                        <label class="form-label fw-bold">First Name</label>
                                                        <input type="text" name="username"
                                                               th:value="${user.username}" class="form-control bg-light"
                                                               disabled>

                                                        <label class="form-label fw-bold">Last Name</label>
                                                        <input type="text" name="lastName"
                                                               th:value="${user.lastName}"
                                                               class="form-control bg-light" disabled>

                                                        <label class="form-label fw-bold">Age</label>
                                                        <input type="number" name="age"
                                                               th:value="${user.age}"
                                                               class="form-control bg-light" disabled>

                                                        <label class="form-label fw-bold">Email</label>
                                                        <input type="text" name="email"
                                                               th:value="${user.email}"
                                                               class="form-control bg-light" disabled>

                                                        <label class="form-label fw-bold">Role</label>
                                                        <input type="text" name="roles"
                                                               th:value="${#strings.replace(#strings.listJoin(user.roles.![name], ', '), 'ROLE_', '')}"
                                                               class="form-control bg-light" disabled>

                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary"
                                                                    data-bs-dismiss="modal">Close
                                                            </button>
                                                            <button type="submit" class="btn btn-danger">Delete</button>
                                                        </div>
                                                    </form>

                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="form-content" role="tabpanel">
                <div class="card">
                    <div class="card-header">
                        <h5 class="m-0">Add new user</h5>
                    </div>
                    <div class="card-body d-flex justify-content-center">

                        <form th:action="@{/admin/add}" method="post" class="col-4 text-center">

                            <label class="fw-bold mb-1">First name</label>
                            <input type="text" name="username" class="form-control mb-3" required>

                            <label class="fw-bold mb-1">Last name</label>
                            <input type="text" name="lastName" class="form-control mb-3" required>

                            <label class="fw-bold mb-1">Age</label>
                            <input type="number" name="age" class="form-control mb-3" required>

                            <label class="fw-bold mb-1">Email</label>
                            <input type="email" name="email" class="form-control mb-3" required>

                            <label class="fw-bold mb-1">Password</label>
                            <input type="password" name="password" class="form-control mb-3" required>

                            <label class="fw-bold mb-1">Role</label>
                            <select name="role" class="form-select mb-4" multiple size="2">
                                <option value="ROLE_ADMIN">ADMIN</option>
                                <option value="ROLE_USER" selected>USER</option>
                            </select>
                            <button type="submit" class="btn btn-success px-4"> Add new user</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
