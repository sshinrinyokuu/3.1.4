<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-50 pt-5">

<div class="text-center" style="width: 100%; max-width: 330px;">
    <form th:action="@{/login}" method="post">
        <h2 class="h3 mb-3 fw-normal">Please sign in</h2>


        <input type="email" name="email" class="form-control rounded-bottom-0"
               placeholder="Email address" required autofocus>


        <input type="password" name="password" class="form-control rounded-top-0 mb-3"
               style="margin-top: -1px;" placeholder="Password" required>

        <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
    </form>
</div>

</body>
</html>
