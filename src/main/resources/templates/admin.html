<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <strong id="adminEmailHeader" th:text="${user.email}">admin@gmail.com</strong>
            with roles: <span id="adminRolesHeader" th:text="${#strings.replace(#strings.listJoin(#lists.sort(user.roles.![name]), ' '), 'ROLE_', '')}">ADMIN</span>
        </span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none">Logout
            </button>
        </form>
    </div>
</nav>

<div class="d-flex">

    <div class="nav flex-column nav-pills bg-white" style="width:200px; min-height:100vh;" role="tablist">
        <button class="nav-link active" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin-content" style="text-align: left;">Admin</button>
        <button class="nav-link" id="user-tab" data-bs-toggle="tab" data-bs-target="#user-content" style="text-align: left;">User</button>
    </div>


    <div class="tab-content flex-grow-1 p-4">

        <div class="tab-pane fade show active" id="admin-content">
            <h1>Admin panel</h1>
            <ul class="nav nav-tabs" id="adminTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#table-content">Users table</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#form-content">New User</button>
                </li>
            </ul>

            <div class="tab-content border border-top-0 bg-white">
                <div class="tab-pane fade show active" id="table-content" role="tabpanel">
                    <div class="card border-0">
                        <div class="card-header">
                            <h5 class="m-0">All users</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody id="allUsersTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="form-content" role="tabpanel">
                    <div class="card border-0">
                        <div class="card-header">
                            <h5 class="m-0">Add new user</h5>
                        </div>
                        <div class="card-body d-flex justify-content-center">
                            <form id="newUserForm" class="col-4 text-center">
                                <label class="fw-bold">First name</label>
                                <input type="text" name="username" class="form-control mb-3" required>
                                <label class="fw-bold">Last name</label>
                                <input type="text" name="lastName" class="form-control mb-3" required>
                                <label class="fw-bold">Age</label>
                                <input type="number" name="age" class="form-control mb-3" required>
                                <label class="fw-bold">Email</label>
                                <input type="email" name="email" class="form-control mb-3" required>
                                <label class="fw-bold">Password</label>
                                <input type="password" name="password" class="form-control mb-3" required>
                                <label class="fw-bold">Role</label>
                                <select name="roles" class="form-select mb-4" multiple size="2" id="rolesNew">
                                    <option value="ROLE_ADMIN">ADMIN</option>
                                    <option value="ROLE_USER">USER</option>
                                </select>
                                <button type="submit" class="btn btn-success px-4">Add new user</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="tab-pane fade" id="user-content">
            <h1>User information</h1>
            <div class="card border-0">
                <div class="card-header">
                    <h5 class="m-0">About user</h5>
                </div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${#strings.replace(#strings.listJoin(#lists.sort(user.roles.![name]), ' '), 'ROLE_', '')}"></td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit User</h5>
                <button class="btn-close" data-bs-dismiss="modal">
                </button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">

                    <label class="form-label fw-bold text-center d-block">ID</label>
                    <input type="number" id="editId" class="form-control mb-2" readonly>

                    <label class="form-label fw-bold text-center d-block">First Name</label>
                    <input type="text" id="editUsername" class="form-control mb-2">

                    <label class="form-label fw-bold text-center d-block">Last Name</label>
                    <input type="text" id="editLastName" class="form-control mb-2">

                    <label class="form-label fw-bold text-center d-block">Age</label>
                    <input type="number" id="editAge" class="form-control mb-2">

                    <label class="form-label fw-bold text-center d-block">Email</label>
                    <input type="email" id="editEmail" class="form-control mb-2">

                    <label class="form-label fw-bold text-center d-block">Password</label>
                    <input type="password" id="editPassword" class="form-control mb-2">

                    <label class="form-label fw-bold text-center d-block">Role</label>
                    <select id="editRoles" class="form-select mb-3" multiple size="2"></select>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-info text-white">Edit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button class="btn-close" data-bs-dismiss="modal">

                </button>
            </div>
            <div class="modal-body text-center">
                <form id="deleteUserForm">
                    <label class="fw-bold">ID</label>
                    <input type="text" id="delId" class="form-control mb-2" disabled>
                    <label class="fw-bold">First Name</label>
                    <input type="text" id="delUsername" class="form-control mb-2" disabled>
                    <label class="fw-bold">Last Name</label>
                    <input type="text" id="delLastName" class="form-control mb-2" disabled>
                    <label class="fw-bold">Age</label>
                    <input type="number" id="delAge" class="form-control mb-2" disabled>
                    <label class="fw-bold">Email</label>
                    <input type="text" id="delEmail" class="form-control mb-2" disabled>
                    <label class="fw-bold">Role</label>
                    <input type="text" id="delRoles" class="form-control mb-3" disabled>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "http://localhost:8080/api/admin";


    document.addEventListener('DOMContentLoaded', () => {
        loadAllUsers();
        setupFormHandlers();
    });


    function setupFormHandlers() {
        const newUserForm = document.getElementById('newUserForm');
        if (newUserForm) {
            newUserForm.addEventListener('submit', handleAddUser);
        }

        const editUserForm = document.getElementById('editUserForm');
        if (editUserForm) {
            editUserForm.addEventListener('submit', handleEditUser);
        }

        const deleteUserForm = document.getElementById('deleteUserForm');
        if (deleteUserForm) {
            deleteUserForm.addEventListener('submit', handleDeleteUser);
        }
    }


    async function loadAllUsers() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Ошибка загрузки');

            const users = await response.json();
            const tableBody = document.getElementById('allUsersTable');

            if (!tableBody) return;

            tableBody.innerHTML = '';

            users.forEach(user => {
                let roles = '';
                if (Array.isArray(user.roleName)) {
                    roles = user.roleName.map(r => r.replace('ROLE_', '')).join(', ');
                } else if (typeof user.roleName === 'string') {
                    roles = user.roleName.replace('ROLE_', '');
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                <td>${(user.id)}</td>
                <td>${(user.username)}</td>
                <td>${(user.lastName || '')}</td>
                <td>${user.age || ''}</td>
                <td>${(user.email)}</td>
                <td>${(roles)}</td>
                <td><button class="btn btn-sm btn-info text-white" onclick="openEditModal(${user.id})">Edit</button></td>
                <td><button class="btn btn-sm btn-danger" onclick="openDeleteModal(${user.id})">Delete</button></td>
            `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error(error);

        }
    }


    async function openEditModal(userId) {
        try {
            const response = await fetch(API_URL);
            const users = await response.json();
            const user = users.find(u => u.id === userId);

            document.getElementById('editId').value = user.id;
            document.getElementById('editUsername').value = user.username || '';
            document.getElementById('editLastName').value = user.lastName || '';
            document.getElementById('editAge').value = user.age || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPassword').value = '';


            let userRole = '';
            if (user.roleName && user.roleName.length > 0) {
                userRole = user.roleName[0];
            }

            const rolesSelect = document.getElementById('editRoles');
            rolesSelect.innerHTML = '';


            const allRoles = [
                { value: 'ROLE_ADMIN', text: 'ADMIN' },
                { value: 'ROLE_USER', text: 'USER' }
            ];

            allRoles.forEach(role => {
                const option = document.createElement('option');
                option.value = role.value;
                option.textContent = role.text;
                option.selected = user.roleName.includes(role.value);
                rolesSelect.appendChild(option);
            });

            new bootstrap.Modal(document.getElementById('editModal')).show();
        } catch (error) {
            console.error(error);
        }
    }


    async function openDeleteModal(userId) {
        try {
            const response = await fetch(API_URL);
            const users = await response.json();
            const user = users.find(u => u.id === userId);

            if (!user) {
                return null;
            }

            let roles = '';
            if (Array.isArray(user.roleName)) {
                roles = user.roleName.map(r => r.replace('ROLE_', '')).join(', ');
            } else if (typeof user.roleName === 'string') {
                roles = user.roleName.replace('ROLE_', '');
            }


            document.getElementById('delId').value = user.id;
            document.getElementById('delUsername').value = user.username || '';
            document.getElementById('delLastName').value = user.lastName || '';
            document.getElementById('delAge').value = user.age || '';
            document.getElementById('delEmail').value = user.email || '';
            document.getElementById('delRoles').value = roles;

            const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            deleteModal.show();

        } catch (error) {
            console.error(error);
        }
    }


    async function handleAddUser(event) {
        event.preventDefault();

        const form = event.target;
        const rolesSelect = document.getElementById('rolesNew');
        const selectedRoles = Array.from(rolesSelect.selectedOptions)
            .map(option => option.value);

        const userData = {
            username: form.username.value.trim(),
            lastName: form.lastName.value.trim(),
            age: parseInt(form.age.value),
            email: form.email.value.trim(),
            password: form.password.value,
            roleName: selectedRoles
        };

        console.log('📤 POST /add:', userData);


        try {
            const response = await fetch(`${API_URL}/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                form.reset();
                await loadAllUsers();


                const tableTab = document.querySelector('[data-bs-target="#table-content"]');
                if (tableTab) {
                    const tab = new bootstrap.Tab(tableTab);
                    tab.show();
                }
            } else {
                const error = await response.text();
                alert(error)
            }
        } catch (error) {
            console.error(error);

        }
    }


    async function handleEditUser(event) {
        event.preventDefault();

        const roles = Array.from(document.getElementById('editRoles').selectedOptions)
            .map(option => option.value);

        console.log("ROLES SENT:", roles);

        const userData = {
            id: parseInt(document.getElementById('editId').value),
            username: document.getElementById('editUsername').value.trim(),
            lastName: document.getElementById('editLastName').value.trim(),
            age: parseInt(document.getElementById('editAge').value),
            email: document.getElementById('editEmail').value.trim(),
            password: document.getElementById('editPassword').value,
            roleName: roles
        };

        console.log('📤 PUT /edit:', userData);


        try {
            const response = await fetch(`${API_URL}/edit`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                const modal = bootstrap.Modal.getInstance(document.getElementById('editModal'));
                if (modal) modal.hide();
                await loadAllUsers();

            } else {
                const error = await response.text();
                console.error(error);
            }
        } catch (error) {
            console.error(error);

        }
    }

    async function handleDeleteUser(event) {
        event.preventDefault();

        const userId = parseInt(document.getElementById('delId').value);



        console.log('📤 DELETE /delete, id:', userId);

        try {
            const response = await fetch(`${API_URL}/delete`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: userId })
            });

            if (response.ok) {
                const modal = bootstrap.Modal.getInstance(document.getElementById('deleteModal'));
                if (modal) modal.hide();
                await loadAllUsers();

            } else {
                const error = await response.text();
                alert(error);
            }
        } catch (error) {
            console.error(error);

        }
    }

</script>
</body>
</html>
